<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="get" enctype="multipart/form-data">

    <div>
    <label for="">Nama:</label>
    <input type="text" name="nama" placeholder="Masukan Nama" required>
    </div>

    <div>
    <label for="">Email:</label>
    <input type="email" name="mail" placeholder="Masukan Alamat Email">
    </div>

    <div>
    <label for="">Jenis Kelamin:</label>
    <input type="radio" name="Pilhan" value="L" checked>Laki-Laki
    <input type="radio" name="Pilhan" value="L">Perempuan
    </div>

    <div>
    <label for="">Hobi:</label>
    <input type="checkbox" name="Hobi" value="Musik">Musik
    <input type="checkbox" name="Hobi" value="Olahraga">Olahraga 
    <input type="checkbox" name="Hobi" value="Membaca">Membaca
    </div>

    <div>
    <label for="">Pilihan Kota:</label>
    <select name="kota" id="">
        <option value="Jakarta" selected>Jakarta</option>
        <option value="Bandung">Bandung</option>
        <option value="Surabaya">Surabaya</option>
    </select>
    </div>

    <div>
    <label for="">Upload Foto:</label>
    <input 
        type="file"
        name="Foto"
        accept="image/*"
        required>
    </div>

    <div>
    <button
        name="Submit"
        onclick="alert('Coba lagi!')">Daftar
    </button>
    </div>
</body>
</html>
